name: 请求适配
description: 请求增加适配 APP 规则

title: "[FR] "

body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ 在提交 issue 之前，请您务必确认以下信息，否则此 issue 可能会被关闭❗❗❗

        > [!WARNING]
        > - 不要提供截图，截图对编写规则**没有任何作用❗**
        > - 不要使用**截屏快照**

  - type: checkboxes
    id: base-info-confirm
    attributes:
      label: ✅ 请核对以下内容
      options:
        - label: 我已**开启全局规则**并确认**此 App 无法触发全局规则**
          required: true
        - label: 我已确认使用的是 **最新版订阅** [![GitHub
            Release](https://img.shields.io/github/v/release/emptylight370/gkd-subscription)](https://github.com/emptylight370/gkd-subscription/releases/latest)
            和 **最新版GKD** [![GitHub
            Release](https://img.shields.io/github/v/release/gkd-kit/gkd)](https://github.com/gkd-kit/gkd/releases/latest)
          required: true

  - type: checkboxes
    id: snapshot-confirm
    attributes:
      label: 📸 请确认快照已正确完整提供
      options:
        - label: 我已提供正确的**界面快照**（非截图）
          required: true
        - label: 如果是多次点击才能生效的情况，我已提供**每一次点击的快照**
          required: true

  - type: textarea
    id: snapshot
    attributes:
      label: 📸 需要适配界面的快照
      description: 快照是一个 zip 文件，快照链接是类似 "https://i.gkd.li/i/XXXXXXXX" 的文本
      placeholder: https://i.gkd.li/i/123456
    validations:
      required: true
